name: Release
on:
    push:
        branches:
            - main # React 19 / Mantine 6+ line -> npm dist-tag "latest"
            - v7 # React 16 / Mantine 6 maintenance line -> npm dist-tag "legacy"
jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  # This makes action fetch all Git history so that Changesets can generate changelogs with the correct commits
                  fetch-depth: 0
            - name: Use Node.js v20
              uses: actions/setup-node@v3
              with:
                  node-version: 20.19.0
                  cache: 'yarn'
            - name: Install Dependencies
              run: yarn
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Ensure to have this set up under GitHub secrets
            - name: Create Release Pull Request or Publish to npm
              uses: changesets/action@v1
              with:
                  publish: yarn release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Ensure to have this set up under GitHub secrets
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Ensure to have this set up under GitHub secrets
                  # main -> "latest", any maintenance branch (e.g. v7) -> "legacy"
                  DIST_TAG: ${{ github.ref_name == 'main' && 'latest' || 'legacy' }}
